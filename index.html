<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sumanmol Jewellers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #fff;
      color: #333;
      text-align: center;
    }
    h2 {
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 40px 0 20px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 12px 0;
      font-size: 1.1em;
    }
    .newsletter {
      margin: 60px 0 40px;
    }
    .signup-box {
      display: inline-flex;
      max-width: 380px;
      margin: 20px auto;
      border: 1px solid #ccc;
      overflow: hidden;
    }
    input[type="email"] {
      flex: 1;
      padding: 14px;
      border: none;
      font-size: 1em;
    }
    button {
      background: #000;
      color: white;
      border: none;
      padding: 14px 20px;
      cursor: pointer;
    }
    .social {
      margin: 30px 0;
    }
    .social a {
      margin: 0 12px;
      font-size: 1.8em;
      color: #333;
      text-decoration: none;
    }
    footer {
      margin-top: 80px;
      padding: 20px;
      background: #000;
      color: white;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <h2>PRODUCTS</h2>
  <ul>
    <li>Mangalsutra</li>
    <li>Antique Pendant Set</li>
    <li>Jadau Necklace Set</li>
    <li>Long Necklace Set</li>
  </ul>

  <div class="newsletter">
    <h2>OUR NEWSLETTER</h2>
    <p>Sign up for the latest Ice offers and exclusives.</p>
    
    <div class="signup-box">
      <input type="email" placeholder="Email address" />
      <button>✉</button>
    </div>
  </div>

  <div class="social">
    <a href="#">f</a>
    <a href="#">ig</a>
  </div>

  <footer>
    Copyright © 2026, Sumanmol Jewellers, All Right Reserved.<br>
    Designed by Parm Projects.
  </footer>

</body>
</html>
